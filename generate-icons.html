<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext("2d");
  // Background
  ctx.fillStyle = "#0d0d0d";
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.22);
  ctx.fill();
  // Orange accent circle
  ctx.fillStyle = "#f97316";
  ctx.beginPath();
  ctx.arc(s * 0.5, s * 0.44, s * 0.28, 0, Math.PI * 2);
  ctx.fill();
  // Dumbbell bar
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = s * 0.07;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(s * 0.25, s * 0.44);
  ctx.lineTo(s * 0.75, s * 0.44);
  ctx.stroke();
  // Left weight
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = s * 0.13;
  ctx.beginPath();
  ctx.moveTo(s * 0.22, s * 0.33);
  ctx.lineTo(s * 0.22, s * 0.55);
  ctx.stroke();
  // Right weight
  ctx.beginPath();
  ctx.moveTo(s * 0.78, s * 0.33);
  ctx.lineTo(s * 0.78, s * 0.55);
  ctx.stroke();
  // Label
  ctx.fillStyle = "#e8e8e8";
  ctx.font = `bold ${s * 0.12}px -apple-system, sans-serif`;
  ctx.textAlign = "center";
  ctx.fillText("COACH", s * 0.5, s * 0.82);
}

const c192 = document.getElementById("c192");
const c512 = document.getElementById("c512");
drawIcon(c192);
drawIcon(c512);

// Download both
function download(canvas, name) {
  const a = document.createElement("a");
  a.download = name;
  a.href = canvas.toDataURL("image/png");
  a.click();
}

setTimeout(() => {
  download(c192, "icon-192.png");
  setTimeout(() => download(c512, "icon-512.png"), 500);
}, 500);
</script>
<p>Los iconos se descargan automáticamente. Muévelos a la carpeta <code>icons/</code>.</p>
</body>
</html>
